name: Build and Release

# Triggers on any push or merged PR to the release branch
on:
  push:
    branches: [ release ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # builds net462 targets via reference assemblies

      # ── 2. Dependency DLLs (cached) ──────────────────────────────────────────
      # Cache refreshes monthly so Valheim and BepInEx updates are picked up.
      - name: Get current month for cache key
        id: date
        run: echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache dependency DLLs
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: dep-libs
          key: dep-libs-${{ runner.os }}-${{ steps.date.outputs.month }}

      - name: Install DepotDownloader
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          curl -sL -o depotdownloader.zip \
            "https://github.com/SteamRE/DepotDownloader/releases/latest/download/DepotDownloader-linux-x64.zip"
          unzip -q depotdownloader.zip -d depotdownloader
          chmod +x depotdownloader/DepotDownloader

      - name: Download Valheim Dedicated Server DLLs
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          # DepotDownloader fetches only the files we need (~5 MB vs ~1 GB for full server)
          # App 896660 = Valheim Dedicated Server, free anonymous download
          cat > filelist.txt << 'EOF'
          regex:.*assembly_valheim\.dll$
          regex:.*UnityEngine\.dll$
          regex:.*UnityEngine\.CoreModule\.dll$
          regex:.*UnityEngine\.PhysicsModule\.dll$
          regex:.*UnityEngine\.InputLegacyModule\.dll$
          regex:.*UnityEngine\.IMGUIModule\.dll$
          regex:.*UnityEngine\.TextRenderingModule\.dll$
          regex:.*UnityEngine\.AudioModule\.dll$
          EOF

          ./depotdownloader/DepotDownloader \
            -app 896660 \
            -filelist filelist.txt \
            -dir ./valheim-server

          mkdir -p dep-libs
          find ./valheim-server -name "*.dll" -exec cp {} dep-libs/ \;
          echo "Downloaded DLLs:"
          ls dep-libs/

      - name: Download BepInEx 5.x (latest)
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          # Resolve the latest BepInEx 5.x win_x64 zip URL via GitHub API
          BEPINEX_URL=$(curl -sL "https://api.github.com/repos/BepInEx/BepInEx/releases" \
            | jq -r '[.[] | select(.tag_name | startswith("v5."))][0].assets[]
                      | select(.name | test("win_x64.*\\.zip$"))
                      | .browser_download_url')
          echo "BepInEx URL: $BEPINEX_URL"
          curl -sL -o bepinex.zip "$BEPINEX_URL"
          unzip -q bepinex.zip -d bepinex-extracted
          cp bepinex-extracted/BepInEx/core/BepInEx.dll dep-libs/
          cp bepinex-extracted/BepInEx/core/0Harmony.dll dep-libs/

      # ── 3. Populate libs/ and build ──────────────────────────────────────────
      - name: Populate libs folder
        run: |
          mkdir -p ValheimFPVDrone/libs
          cp dep-libs/*.dll ValheimFPVDrone/libs/
          echo "DLLs in libs/:"
          ls ValheimFPVDrone/libs/

      - name: Build Release
        run: |
          dotnet build ValheimFPVDrone/ValheimFPVDrone.csproj \
            -c Release \
            --nologo

      # ── 4. Extract version from source ───────────────────────────────────────
      - name: Get version from Plugin.cs
        id: version
        run: |
          VERSION=$(grep -oP 'PluginVersion\s*=\s*"\K[^"]+' \
            ValheimFPVDrone/Plugin.cs)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      # ── 5. Package ────────────────────────────────────────────────────────────
      - name: Create release zip
        run: |
          mkdir -p dist
          cp ValheimFPVDrone/bin/Release/net462/ValheimFPVDrone.dll dist/
          cp manifest.json dist/
          cp README.md dist/
          cd dist
          zip ValheimFPVDrone-v${{ steps.version.outputs.version }}.zip \
            ValheimFPVDrone.dll manifest.json README.md
          echo "Release contents:"
          unzip -l ValheimFPVDrone-v${{ steps.version.outputs.version }}.zip

      # ── 6. Publish GitHub Release ─────────────────────────────────────────────
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ValheimFPVDrone v${{ steps.version.outputs.version }}
          prerelease: true
          make_latest: true
          body: |
            Automated build from the `release` branch.

            > **Work In Progress** — expect bugs.

            ### Installation
            1. Install [BepInEx 5.4.x for Valheim](https://valheim.thunderstore.io/package/denikson/BepInExPack_Valheim/)
            2. Extract `ValheimFPVDrone.dll` into `Valheim/BepInEx/plugins/ValheimFPVDrone/`
            3. Launch Valheim — press **F8** to spawn the drone, **F7** to calibrate your controller

            See README.md for full documentation.
          files: dist/ValheimFPVDrone-v${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
